name: ci

on:
  push:
    tags:
      - "paper-v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: pytest -q helmas3n/tests

  paper:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Generate paper assets
        run: |
          python paper/scripts/generate_assets.py

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-pictures

      - name: Build paper
        working-directory: paper
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: helmas3n-paper
          path: paper/main.pdf

  paper_release:
    runs-on: ubuntu-latest
    needs: paper
    if: startsWith(github.ref, 'refs/tags/paper-v')
    permissions:
      contents: write
    steps:
      - name: Download paper artifact
        uses: actions/download-artifact@v4
        with:
          name: helmas3n-paper
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "HeLMAS-3n Paper ${{ github.ref_name }}"
          files: release/main.pdf
          generate_release_notes: true
