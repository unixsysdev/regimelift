name: ci

on:
  push:
    branches:
      - main
    tags:
      - "paper-v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: pytest -q helmas3n/tests

  paper:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Generate paper assets
        run: |
          python paper/scripts/generate_assets.py

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-pictures

      - name: Build paper
        working-directory: paper
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex

      - name: Check tracked paper PDF sync status
        run: |
          if git diff --quiet -- paper/main.pdf; then
            echo "paper/main.pdf is in sync."
          else
            echo "::warning::paper/main.pdf differs from CI-generated PDF."
            echo "::warning::A sync commit will be created from the rolling artifact in paper_release_main."
          fi

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: regimelift-paper
          path: paper/main.pdf

  paper_release:
    runs-on: ubuntu-latest
    needs: paper
    if: startsWith(github.ref, 'refs/tags/paper-v')
    permissions:
      contents: write
    steps:
      - name: Download paper artifact
        uses: actions/download-artifact@v4
        with:
          name: regimelift-paper
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "RegimeLift Paper ${{ github.ref_name }}"
          files: release/main.pdf
          generate_release_notes: true

  paper_release_main:
    runs-on: ubuntu-latest
    needs: paper
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move rolling paper tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f paper-main "${GITHUB_SHA}"
          git push origin refs/tags/paper-main --force

      - name: Download paper artifact
        uses: actions/download-artifact@v4
        with:
          name: regimelift-paper
          path: release

      - name: Sync tracked paper PDF from CI artifact
        run: |
          cp release/main.pdf paper/main.pdf
          if git diff --quiet -- paper/main.pdf; then
            echo "paper/main.pdf already in sync with rolling artifact."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper/main.pdf
          git commit -m "ci: sync tracked paper PDF from rolling artifact [skip ci]"
          git push origin HEAD:main

      - name: Publish rolling paper release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: paper-main
          name: "RegimeLift Paper (main)"
          body: |
            Rolling paper build from `main`.

            Source commit: `${{ github.sha }}`
          prerelease: false
          make_latest: true
          files: release/main.pdf
          overwrite_files: true
